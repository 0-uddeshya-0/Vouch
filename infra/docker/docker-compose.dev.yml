version: '3.8'

# Development Docker Compose
# Use this for local development with hot reload

services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: base
    command: ["pnpm", "run", "dev"]
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/vouch?schema=public
      - REDIS_URL=redis://redis:6379
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ../..:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    networks:
      - vouch-network

  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: base
    command: ["pnpm", "run", "dev:worker"]
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/vouch?schema=public
      - REDIS_URL=redis://redis:6379
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ../..:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
    networks:
      - vouch-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vouch
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vouch-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - vouch-network

  # Prisma Studio for database management
  prisma-studio:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: base
    command: ["npx", "prisma", "studio", "--port", "5555"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/vouch?schema=public
    volumes:
      - ../..:/app
      - /app/node_modules
    depends_on:
      - db
    ports:
      - "5555:5555"
    networks:
      - vouch-network

volumes:
  postgres-data:

networks:
  vouch-network:
    driver: bridge
